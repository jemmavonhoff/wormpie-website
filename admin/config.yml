backend:
  name: github
  repo: jemmavonhoff/wormpie-website
  branch: main

media_folder: images
public_folder: /images

collections:
  - name: photos
    label: Photos
    label_singular: Photo
    folder: _photos
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, required: false, hint: "Optional — just for your reference" }
      - { label: Photo, name: image, widget: image }
      - label: Section
        name: section
        widget: select
        default: home
        options:
          - { label: "Home (mixed feed)", value: home }
          - { label: "Gallery (art only)", value: gallery }
          - { label: "Life (lifestyle/process)", value: life }
